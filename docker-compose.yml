services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_UMAMI_SITE_ID: ${VITE_UMAMI_SITE_ID}
        VITE_UMAMI_URL: ${VITE_UMAMI_URL}
    container_name: portfolio-site
    restart: unless-stopped
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio.rule=Host(`msarac.me`) || Host(`www.msarac.me`)"
      - "traefik.http.services.portfolio.loadbalancer.server.port=80"
    # volumes:
    #   - ./cv:/usr/share/nginx/html/cv   # CV güncellemek için aktifleştir, rebuild gerekmez

  umami-db:
    image: postgres:16-alpine
    container_name: umami-db
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:?UMAMI_DB_PASSWORD is required}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - traefik-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:latest
    container_name: umami
    restart: unless-stopped
    init: true
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.umami.rule=Host(`umami.msarac.me`)"
      - "traefik.http.services.umami.loadbalancer.server.port=3000"
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:?}@umami-db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:?UMAMI_APP_SECRET is required}
      CORS_ORIGINS: ${UMAMI_CORS_ORIGINS:-https://msarac.me}
      CLIENT_IP_HEADER: X-Forwarded-For
      SKIP_LOCATION_HEADERS: 1
    depends_on:
      umami-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:3000/api/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  umami-db-data:

networks:
  traefik-net:
    external: true
